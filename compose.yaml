services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: junior
      POSTGRES_PASSWORD: junior
      POSTGRES_USER: junior
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U junior -d junior"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "54322:5432"
    volumes:
      - junior-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "6382:6379"
    volumes:
      - junior-redis:/data

volumes:
  junior-postgres:
  junior-redis:
