name: github
description: GitHub issue management via GitHub App

capabilities:
  - actions.read
  - actions.write
  - issues.read
  - issues.write
  - contents.read
  - contents.write
  - pull-requests.read
  - pull-requests.write

config-keys:
  - org
  - repo

credentials:
  type: github-app
  api-domains:
    - api.github.com
  auth-token-env: GITHUB_TOKEN
  auth-token-placeholder: ghp_host_managed_credential
  app-id-env: GITHUB_APP_ID
  private-key-env: GITHUB_APP_PRIVATE_KEY
  installation-id-env: GITHUB_INSTALLATION_ID

target:
  type: repo
  config-key: repo
  command-flags:
    - --repo
    - -R

runtime-dependencies:
  - type: system
    package: gh
