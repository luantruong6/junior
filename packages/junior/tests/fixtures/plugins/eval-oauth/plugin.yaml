name: eval-oauth
display-name: Eval OAuth
description: Eval-only generic OAuth auth-resume fixture

capabilities:
  - read

credentials:
  type: oauth-bearer
  domains:
    - example.com
  auth-token-env: EVAL_OAUTH_ACCESS_TOKEN

oauth:
  client-id-env: EVAL_OAUTH_CLIENT_ID
  client-secret-env: EVAL_OAUTH_CLIENT_SECRET
  authorize-endpoint: https://example.com/junior-eval-oauth/oauth/authorize
  token-endpoint: https://example.com/junior-eval-oauth/oauth/token
  scope: read
